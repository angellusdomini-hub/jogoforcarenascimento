<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Forca - Renascimento</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #3b1f0e, #8b5e34, #d4a45c);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .jogo-container {
      width: 100%;
      max-width: 1100px;
      background: rgba(45, 24, 10, 0.95);
      border: 4px solid #f1c27d;
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin: 0 0 10px;
      color: #ffd27f;
      text-shadow: 2px 2px 4px #000;
    }

    .subtitulo {
      text-align: center;
      font-size: 20px;
      margin-bottom: 25px;
      color: #fff1cf;
    }

    .conteudo {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 30px;
      align-items: center;
    }

    .forca-area {
      background: #f4d9a6;
      border-radius: 20px;
      padding: 20px;
      color: #3b1f0e;
      text-align: center;
      border: 4px solid #b67b3d;
    }

    svg {
      width: 250px;
      max-width: 100%;
      height: 300px;
    }

    .parte-corpo {
      display: none;
      stroke: #3b1f0e;
      stroke-width: 6;
      stroke-linecap: round;
      fill: none;
    }

    .painel-jogo {
      text-align: center;
    }

    .contador {
      background: #6e3e18;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      border: 2px solid #ffd27f;
    }

    .dica {
      background: rgba(255, 210, 127, 0.18);
      border-left: 6px solid #ffd27f;
      padding: 18px;
      border-radius: 14px;
      font-size: 21px;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .palavra {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 70px;
      margin-bottom: 25px;
    }

    .letra-espaco {
      width: 48px;
      height: 60px;
      border-bottom: 5px solid #ffd27f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: bold;
      text-transform: uppercase;
      color: white;
    }

    .espaco {
      width: 30px;
      border-bottom: none;
    }

    .teclado {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .teclado button {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: #ffd27f;
      color: #3b1f0e;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .teclado button:hover {
      background: #fff0cc;
      transform: scale(1.06);
    }

    .teclado button:disabled {
      background: #8a7150;
      color: #ddd;
      cursor: not-allowed;
      transform: none;
    }

    .mensagem {
      min-height: 45px;
      font-size: 25px;
      font-weight: bold;
      margin: 15px 0;
    }

    .vitoria {
      color: #9cff9c;
    }

    .derrota {
      color: #ff9c9c;
    }

    .botoes {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 10px;
    }

    .botao {
      border: none;
      padding: 14px 24px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 14px;
      cursor: pointer;
      background: #f1c27d;
      color: #3b1f0e;
      transition: 0.2s;
    }

    .botao:hover {
      background: #ffe0a8;
      transform: scale(1.04);
    }

    .rodape {
      text-align: center;
      margin-top: 25px;
      color: #f7deb0;
      font-size: 15px;
    }

    @media (max-width: 850px) {
      .conteudo {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 32px;
      }

      .dica {
        font-size: 18px;
      }

      .letra-espaco {
        width: 38px;
        height: 52px;
        font-size: 30px;
      }

      .teclado button {
        width: 42px;
        height: 42px;
        font-size: 19px;
      }
    }
  </style>
</head>

<body>

  <div class="jogo-container">
    <h1>Jogo da Forca</h1>
    <div class="subtitulo">Tema: Renascimento Cultural</div>

    <div class="conteudo">

      <div class="forca-area">
        <svg viewBox="0 0 250 300">
          <!-- Estrutura da forca -->
          <line x1="30" y1="270" x2="180" y2="270" stroke="#3b1f0e" stroke-width="7"/>
          <line x1="75" y1="270" x2="75" y2="35" stroke="#3b1f0e" stroke-width="7"/>
          <line x1="75" y1="35" x2="170" y2="35" stroke="#3b1f0e" stroke-width="7"/>
          <line x1="170" y1="35" x2="170" y2="70" stroke="#3b1f0e" stroke-width="7"/>

          <!-- Boneco -->
          <circle id="parte1" class="parte-corpo" cx="170" cy="95" r="24"/>
          <line id="parte2" class="parte-corpo" x1="170" y1="119" x2="170" y2="190"/>
          <line id="parte3" class="parte-corpo" x1="170" y1="140" x2="135" y2="165"/>
          <line id="parte4" class="parte-corpo" x1="170" y1="140" x2="205" y2="165"/>
          <line id="parte5" class="parte-corpo" x1="170" y1="190" x2="140" y2="235"/>
          <line id="parte6" class="parte-corpo" x1="170" y1="190" x2="200" y2="235"/>
        </svg>
      </div>

      <div class="painel-jogo">

        <div class="contador">
          Palavra <span id="numeroPalavra">1</span> de 15
        </div>

        <div class="dica">
          <strong>Dica:</strong>
          <span id="textoDica"></span>
        </div>

        <div class="palavra" id="palavraSecreta"></div>

        <div class="teclado" id="teclado"></div>

        <div class="mensagem" id="mensagem"></div>

        <div class="botoes">
          <button class="botao" onclick="reiniciarPalavra()">Reiniciar Palavra</button>
          <button class="botao" onclick="proximaPalavra()">Próxima Palavra</button>
        </div>

      </div>
    </div>

    <div class="rodape">
      Atividade interativa de História — Renascimento Cultural
    </div>
  </div>

  <script>
    const listaPalavras = [
      {
        palavra: "RENASCIMENTO",
        dica: "Movimento cultural europeu que valorizou a arte, a ciência e o ser humano."
      },
      {
        palavra: "HUMANISMO",
        dica: "Corrente de pensamento que valorizava as capacidades e ações humanas."
      },
      {
        palavra: "ANTROPOCENTRISMO",
        dica: "Ideia que coloca o ser humano no centro das reflexões."
      },
      {
        palavra: "MECENATO",
        dica: "Prática de financiar artistas, cientistas e escritores."
      },
      {
        palavra: "BURGUESIA",
        dica: "Grupo social ligado ao comércio que apoiou muitas produções renascentistas."
      },
      {
        palavra: "PERSPECTIVA",
        dica: "Técnica artística usada para criar sensação de profundidade nas pinturas."
      },
      {
        palavra: "LEONARDO",
        dica: "Primeiro nome do artista que pintou a Mona Lisa e a Última Ceia."
      },
      {
        palavra: "MICHELANGELO",
        dica: "Artista renascentista que pintou o teto da Capela Sistina."
      },
      {
        palavra: "RAFAEL",
        dica: "Pintor renascentista conhecido por obras harmoniosas e equilibradas."
      },
      {
        palavra: "MONALISA",
        dica: "Famosa pintura de Leonardo da Vinci."
      },
      {
        palavra: "IMPRENSA",
        dica: "Invenção que facilitou a circulação de livros e ideias pela Europa."
      },
      {
        palavra: "GUTENBERG",
        dica: "Nome do inventor associado à prensa de tipos móveis."
      },
      {
        palavra: "CIENCIA",
        dica: "Área do conhecimento muito valorizada durante o Renascimento."
      },
      {
        palavra: "ANATOMIA",
        dica: "Estudo do corpo humano, importante para artistas e estudiosos renascentistas."
      },
      {
        palavra: "FLORENCA",
        dica: "Cidade italiana considerada um dos principais centros do Renascimento."
      }
    ];

    const alfabeto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    let indiceAtual = 0;
    let palavraAtual = "";
    let dicaAtual = "";
    let letrasCorretas = [];
    let letrasUsadas = [];
    let erros = 0;
    const maxErros = 6;
    let jogoEncerrado = false;

    function removerAcentos(texto) {
      return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function iniciarJogo() {
      const item = listaPalavras[indiceAtual];
      palavraAtual = removerAcentos(item.palavra.toUpperCase());
      dicaAtual = item.dica;

      letrasCorretas = [];
      letrasUsadas = [];
      erros = 0;
      jogoEncerrado = false;

      document.getElementById("numeroPalavra").textContent = indiceAtual + 1;
      document.getElementById("textoDica").textContent = dicaAtual;
      document.getElementById("mensagem").textContent = "";
      document.getElementById("mensagem").className = "mensagem";

      esconderBoneco();
      criarTeclado();
      atualizarPalavra();
    }

    function criarTeclado() {
      const teclado = document.getElementById("teclado");
      teclado.innerHTML = "";

      alfabeto.forEach(letra => {
        const botao = document.createElement("button");
        botao.textContent = letra;
        botao.onclick = () => escolherLetra(letra, botao);
        teclado.appendChild(botao);
      });
    }

    function escolherLetra(letra, botao) {
      if (jogoEncerrado || letrasUsadas.includes(letra)) {
        return;
      }

      letrasUsadas.push(letra);
      botao.disabled = true;

      if (palavraAtual.includes(letra)) {
        letrasCorretas.push(letra);
      } else {
        erros++;
        mostrarParteCorpo(erros);
      }

      atualizarPalavra();
      verificarResultado();
    }

    function atualizarPalavra() {
      const areaPalavra = document.getElementById("palavraSecreta");
      areaPalavra.innerHTML = "";

      palavraAtual.split("").forEach(letra => {
        const div = document.createElement("div");

        if (letra === " ") {
          div.className = "letra-espaco espaco";
          div.textContent = "";
        } else {
          div.className = "letra-espaco";
          div.textContent = letrasCorretas.includes(letra) ? letra : "";
        }

        areaPalavra.appendChild(div);
      });
    }

    function verificarResultado() {
      const venceu = palavraAtual
        .split("")
        .every(letra => letra === " " || letrasCorretas.includes(letra));

      if (venceu) {
        jogoEncerrado = true;
        const mensagem = document.getElementById("mensagem");
        mensagem.textContent = "Parabéns! Você acertou a palavra!";
        mensagem.classList.add("vitoria");
        desativarTeclado();
      }

      if (erros >= maxErros) {
        jogoEncerrado = true;
        const mensagem = document.getElementById("mensagem");
        mensagem.textContent = `Fim de jogo! A palavra era: ${palavraAtual}`;
        mensagem.classList.add("derrota");
        revelarPalavra();
        desativarTeclado();
      }
    }

    function mostrarParteCorpo(numero) {
      const parte = document.getElementById("parte" + numero);
      if (parte) {
        parte.style.display = "block";
      }
    }

    function esconderBoneco() {
      for (let i = 1; i <= 6; i++) {
        document.getElementById("parte" + i).style.display = "none";
      }
    }

    function revelarPalavra() {
      palavraAtual.split("").forEach(letra => {
        if (letra !== " " && !letrasCorretas.includes(letra)) {
          letrasCorretas.push(letra);
        }
      });
      atualizarPalavra();
    }

    function desativarTeclado() {
      const botoes = document.querySelectorAll(".teclado button");
      botoes.forEach(botao => botao.disabled = true);
    }

    function reiniciarPalavra() {
      iniciarJogo();
    }

    function proximaPalavra() {
      indiceAtual++;

      if (indiceAtual >= listaPalavras.length) {
        indiceAtual = 0;
      }

      iniciarJogo();
    }

    iniciarJogo();
  </script>

</body>
</html>
